<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pond Search</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" />
    <link rel="stylesheet" href="style.css">

    <script src="/scramjet.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tomphttp/bare-mux@2.1.7/dist/index.js"></script>
</head>
<body>

  <img src="ducky.png" alt="ducky">
  
  <div class="search-container">
    <i class="ri-search-line search-icon"></i>
    <input type="text" id="search-input" class="search-bar" placeholder="Search the pond...">
  </div>

  <script>
    // --- 1. Service Worker & Bare-Mux Connection Setup ---
    async function initProxy() {
      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.register('/scramjet.worker.js', {
            scope: window.__scramjet$config?.prefix || '/service/'
          });

          // Connects your HTML page to the Shared Worker script you provided
          const connection = new BareMux.BareMuxConnection("/mux-worker.js");
          
          // Set up the remote Wisp transport backend
          await connection.setTransport("FluxTransport", [window.__scramjet$config.wisp]);
          console.log("Proxy engine ready on Vercel backend!");
        } catch (err) {
          console.error("Proxy registration failed:", err);
        }
      }
    }
    initProxy();

    // --- 2. Theme Logic ---
    function applyLocalTheme() {
      const themeColors = {
        light:    ['#f7f7f7', '#ffffff'],
        dark:     ['#121212', '#1e1e1e'],
        ducky:    ['#FFF9E6', '#FFF0B3'],
        midnight: ['#050505', '#0d0d0d'],
        emerald:  ['#e8f5e9', '#c8e6c9'],
        rose:     ['#fce4ec', '#f8bbd0'],
        cyber:    ['#0f051d', '#1a0b2e'],
        sunset:   ['#fdf2e9', '#fadbd8']
      };

      const savedTheme = localStorage.getItem('pond-theme') || 'light';
      const colors = themeColors[savedTheme];
      if (colors) {
        document.body.style.backgroundColor = colors[1];
      }
    }

    // --- 3. Search Routine Execution ---
    const searchInput = document.getElementById('search-input');

    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        const query = searchInput.value.trim();
        if (query) {
          let url = query;
          
          if (!/^https?:\/\//i.test(query) && !query.includes('.')) {
            url = 'https://www.google.com/search?q=' + encodeURIComponent(query);
          } else if (!/^https?:\/\//i.test(query)) {
            url = 'http://' + query;
          }

          const config = window.__scramjet$config;
          if (config) {
            window.location.href = config.prefix + config.encodeUrl(url);
          }
        }
      }
    });

    window.addEventListener('DOMContentLoaded', applyLocalTheme);
    window.addEventListener('storage', (e) => {
      if (e.key === 'pond-theme') applyLocalTheme();
    });
  </script>
</body>
</html>
